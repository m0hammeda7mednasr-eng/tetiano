version: "3.8"

services:
  # PostgreSQL (للتطوير المحلي - اختياري)
  postgres:
    image: postgres:15-alpine
    container_name: tetiano-postgres
    environment:
      POSTGRES_DB: tetiano_dev
      POSTGRES_USER: tetiano_user
      POSTGRES_PASSWORD: tetiano_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tetiano_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tetiano-backend
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tetiano-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_SUPABASE_URL: ${SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      VITE_API_URL: http://localhost:3002
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    name: tetiano-network
